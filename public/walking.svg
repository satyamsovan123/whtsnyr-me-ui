<style>
  @keyframes walk-leg1 {
    0% { transform: rotate(-0.5deg); }
    50% { transform: rotate(0.5deg); }
    100% { transform: rotate(-0.5deg); }
  }
  @keyframes walk-leg2 {
    0% { transform: rotate(0.5deg); }
    50% { transform: rotate(-0.5deg); }
    100% { transform: rotate(0.5deg); }
  }
  @keyframes bob-body {
    0%, 50%, 100% { transform: translateY(0px); }
    25%, 75% { transform: translateY(-1px); }
  }
  .leg-1 {
    animation: walk-leg1 2.5s ease-in-out infinite;
    transform-origin: 90px 200px;
  }
  .leg-2 {
    animation: walk-leg2 2.5s ease-in-out infinite;
    transform-origin: 90px 200px;
  }
  .whole-body {
    animation: bob-body 2.5s ease-in-out infinite;
  }
</style>
