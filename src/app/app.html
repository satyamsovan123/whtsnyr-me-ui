<div [class.sidebar-collapsed]="sidebarService.isCollapsed()">
  <app-navbar></app-navbar>
  
  <main class="main-content-wrapper position-relative">
    <router-outlet></router-outlet>
  </main>
</div>

<!-- Global UI Overlays -->
<app-loader></app-loader>
<app-toast></app-toast>

<style>
  /* Give space for mobile nav and desktop sidebar */
  .main-content-wrapper {
    padding-bottom: 70px; /* Mobile Nav */
    overflow-x: hidden;
    width: 100%;
    min-height: 100vh;
  }
  @media (min-width: 768px) {
    .main-content-wrapper {
      margin-left: 260px; /* Desktop Sidebar width */
      width: calc(100% - 260px);
      padding-bottom: 0;
      transition: margin-left 0.3s ease, width 0.3s ease;
    }
    .sidebar-collapsed .main-content-wrapper {
      margin-left: 80px; /* Collapsed width */
      width: calc(100% - 80px);
    }
  }
</style>
