<div class="d-flex w-100" style="height: 100vh; height: 100dvh; overflow: hidden;" [class.sidebar-collapsed]="sidebarService.isCollapsed()">

  <main class="flex-grow-1 main-content-wrapper position-relative" style="height: 100%; overflow-y: auto; overflow-x: hidden;">

    <router-outlet></router-outlet>
  </main>
</div>

<!-- Global UI Overlays -->
<app-loader></app-loader>
<app-toast></app-toast>

    padding-bottom: 70px; /* Mobile Nav */

    .main-content-wrapper {
      margin-left: 260px; /* Desktop Sidebar width */
      padding-bottom: 0;
      transition: margin-left 0.3s ease;
